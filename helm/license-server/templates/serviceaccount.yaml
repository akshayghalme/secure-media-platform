{{/*
  ServiceAccount — identity for the pod within Kubernetes.

  WHY dedicated SA: The default SA has no IAM permissions. By creating a
  dedicated SA, we can annotate it with an IAM role ARN (IRSA) to grant
  the license server KMS decrypt and DynamoDB read permissions without
  storing any AWS credentials in the cluster.
*/}}
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  labels:
    app: {{ .Release.Name }}
  {{- if or .Values.serviceAccount.roleArn .Values.serviceAccount.annotations }}
  annotations:
    {{- if .Values.serviceAccount.roleArn }}
    # WHY computed here, not in values.yaml: callers set the role ARN
    # via a simple `--set serviceAccount.roleArn=<arn>`. Dotted annotation
    # keys like `eks.amazonaws.com/role-arn` are painful to override via
    # --set because of the escaping rules. Auto-rendering here keeps the
    # install command readable.
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccount.roleArn | quote }}
    {{- end }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
