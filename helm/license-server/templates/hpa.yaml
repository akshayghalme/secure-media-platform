{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "license-server.fullname" . }}
  labels:
    {{- include "license-server.labels" . | nindent 4 }}
spec:
  # WHY target the Deployment: HPA adjusts the replica count on the same
  # Deployment the chart creates. Kind/name/apiVersion must match exactly
  # or the HPA silently fails with "unable to find target".
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "license-server.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.autoscaling.targetCPUUtilizationPercentage }}
    # WHY CPU at 70%: leaves 30% headroom so pods can absorb a sudden spike
    # while new replicas are still being scheduled (~30s on EKS). Targeting
    # 90% means a traffic burst melts the existing pods before scale-out lands.
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.autoscaling.targetMemoryUtilizationPercentage }}
    # WHY also memory: Redis client + response caching can push memory before
    # CPU saturates. Without a memory signal, OOMKills would happen before
    # CPU-based HPA ever reacted.
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
  # WHY behavior block: default HPA scale-down is aggressive (drops pods
  # within seconds of load dropping), which causes thrashing for a bursty
  # license-check workload. We stabilize scale-down over 5 minutes so a
  # brief lull doesn't kill pods we'll need 30 seconds later.
  behavior:
    scaleDown:
      stabilizationWindowSeconds: {{ .Values.autoscaling.scaleDownStabilizationSeconds }}
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      # Scale up fast: doubling pods every 30s handles flash-crowd events
      # (new episode drop, live sports) without queueing license requests.
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      # WHY selectPolicy Max: pick whichever of the two policies above
      # adds more pods — percent-based grows faster once we're already
      # large, pods-based grows faster when replica count is small.
      selectPolicy: Max
{{- end }}
