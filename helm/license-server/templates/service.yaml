{{/*
  Service template — provides stable DNS name and load balancing across pods.

  WHY a Service at all: Pods get random IPs that change on restart. The Service
  gives a stable `license-server.default.svc.cluster.local` DNS name that
  other services (and the Ingress/ALB) can rely on.
*/}}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    app: {{ .Release.Name }}
