# Grafana dashboard provisioning via ConfigMap.
#
# WHY a ConfigMap with a label selector: kube-prometheus-stack ships a
# Grafana sidecar (kiwigrid/k8s-sidecar) that watches for ConfigMaps
# labelled `grafana_dashboard=1` and loads every key in `data` as a
# dashboard JSON at runtime — no Grafana API calls, no restart, no
# terraform-grafana provider needed. Drop the ConfigMap in, refresh
# Grafana, the dashboard appears.
#
# Apply:
#   kubectl -n monitoring apply -f dashboard-configmap.yaml
#
# Then refresh Grafana → Dashboards → "License Server — SLIs".
#
# NOTE: the `dashboard-license-server.json` contents must be embedded
# below. Keep the two files in sync; the Makefile target `make grafana`
# (scripts/load-grafana-dashboard.sh) regenerates this ConfigMap from
# the JSON so you only edit the JSON by hand.
apiVersion: v1
kind: ConfigMap
metadata:
  name: license-server-slis-dashboard
  namespace: monitoring
  labels:
    # WHY this exact label: it's the default selector the kube-prometheus-stack
    # Grafana sidecar uses (`sidecar.dashboards.label=grafana_dashboard`).
    # Change it only if you overrode that value in your Helm values.
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: license-server
    phase: "4"
data:
  # The sidecar treats each key as a dashboard filename; the value must
  # be the raw dashboard JSON. Populated by scripts/load-grafana-dashboard.sh
  # from dashboard-license-server.json. Do not edit by hand.
  license-server-slis.json: |
    {}
